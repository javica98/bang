<script>
        const MIN_PLAYERS = 4;
        const MAX_PLAYERS = 7;
        let playerCount = 4;

        const display = document.getElementById('player-count-display');
        const minusBtn = document.getElementById('minus-btn');
        const plusBtn = document.getElementById('plus-btn');
        const inputsContainer = document.getElementById('player-inputs');

        const defaultNames = ["Billy the Kid", "Calamity Jane", "Doc Holliday", "Jesse James", "Belle Starr", "Butch Cassidy", "Wyatt Earp"];

        function updateInputs() {
            inputsContainer.innerHTML = '';
            for (let i = 0; i < playerCount; i++) {
                const div = document.createElement('div');
                div.className = 'group flex flex-col gap-1';
                
                const label = document.createElement('label');
                label.className = 'font-label-mono text-[10px] text-outline uppercase ml-1';
                label.innerText = `Pistolero ${i + 1}`;
                
                const input = document.createElement('input');
                input.type = 'text';
                input.required = true;
                input.placeholder = defaultNames[i % defaultNames.length];
                input.className = 'w-full bg-background border-4 border-outline p-4 font-headline-md text-primary focus:border-primary-container focus:ring-0 placeholder:opacity-30 transition-colors shadow-inner';
                
                div.appendChild(label);
                div.appendChild(input);
                inputsContainer.appendChild(div);
            }
        }

        minusBtn.addEventListener('click', () => {
            if (playerCount > MIN_PLAYERS) {
                playerCount--;
                display.innerText = playerCount;
                updateInputs();
            }
        });

        plusBtn.addEventListener('click', () => {
            if (playerCount < MAX_PLAYERS) {
                playerCount++;
                display.innerText = playerCount;
                updateInputs();
            }
        });

        // Initialize
        updateInputs();

        // Prevent form reload and simulate shuffle
        document.getElementById('setup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerText = "BARAJANDO...";
            btn.disabled = true;
            
            // Simple visual feedback
            setTimeout(() => {
                alert("¡Cartas repartidas! El Sheriff empieza el duelo.");
                btn.innerText = "BARAJAR Y REPARTIR";
                btn.disabled = false;
            }, 1500);
        });
    </script>
