<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BANG!</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* Balatro-inspired palette: deep purple/navy stage, gold highlights,
     chip-red / mult-blue accents, cream card faces. */
  --bg-deep:      #180f2e;
  --bg-mid:       #241a42;
  --surface-low:  #23193f;
  --surface:      #2c2050;
  --surface-high: #382a63;
  --surface-top:  #473578;
  --on-surface:   #fbf6ff;
  --on-muted:     #b6a6dd;
  --outline:      #100a1f;
  --outline-soft: #6a54a8;
  --gold:         #ffd23f;
  --gold-dim:     #e0a400;
  --gold-text:    #4a2e00;
  --red:          #ff5d73;
  --red-dim:      #6e2030;
  --green:        #48e08a;
  --green-dim:    #1f5a3c;
  --blue:         #4fd0ff;
  --blue-dim:     #1c4a6e;
  --purple-acc:   #b98bff;
  --paper:        #fff4de;
  --paper-edge:   #e0b95a;
  --ink:          #2a1a3a;
  --shadow:       rgba(8, 4, 20, 0.6);
  --font-head:    'Bungee', 'Baloo 2', 'Arial Black', sans-serif;
  --font-body:    'Nunito', 'Segoe UI', sans-serif;
  --font-mono:    'Baloo 2', 'Segoe UI', sans-serif;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--on-surface);
}

/* ── STAGE BACKGROUNDS ────────────────────────────────── */
.dither-bg {
  background:
    radial-gradient(ellipse at 50% -10%, rgba(255,210,63,0.16) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 110%, rgba(185,139,255,0.14) 0%, transparent 60%),
    linear-gradient(180deg, var(--bg-mid) 0%, var(--bg-deep) 100%);
  background-color: var(--bg-deep);
}
.dither-floor {
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255,210,63,0.10) 0%, transparent 50%),
    repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 2px, transparent 2px, transparent 26px),
    linear-gradient(180deg, var(--surface-low) 0%, var(--bg-deep) 100%);
  background-color: var(--bg-deep);
}

/* ── SUITS ────────────────────────────────────────────── */
.suit-red   { color: #d81c3f; font-weight: 800; }
.suit-black { color: var(--ink); font-weight: 800; }

/* ── CHUNKY BUTTONS ──────────────────────────────────── */
.pixel-btn {
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 3px solid var(--outline);
  border-radius: 14px;
  background: var(--surface-high);
  color: var(--on-surface);
  padding: 12px 22px;
  cursor: pointer;
  box-shadow: 0 5px 0 var(--outline), 0 8px 14px var(--shadow);
  transition: background 0.12s, color 0.12s, transform 0.08s, box-shadow 0.08s;
  user-select: none;
}
.pixel-btn:hover  { background: var(--surface-top); transform: translateY(-2px); box-shadow: 0 7px 0 var(--outline), 0 12px 18px var(--shadow); }
.pixel-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--outline), 0 4px 8px var(--shadow); }
.pixel-btn.primary { background: var(--gold); color: var(--gold-text); border-color: var(--outline); box-shadow: 0 5px 0 var(--gold-dim), 0 8px 16px rgba(255,210,63,0.35); }
.pixel-btn.primary:hover { background: #ffdd6b; box-shadow: 0 7px 0 var(--gold-dim), 0 12px 20px rgba(255,210,63,0.45); }
.pixel-btn.primary:active { box-shadow: 0 2px 0 var(--gold-dim); }
.pixel-btn.ghost   { background: transparent; border-color: var(--outline-soft); color: var(--on-muted); box-shadow: none; }
.pixel-btn.ghost:hover { background: var(--surface-high); color: var(--on-surface); transform: none; }

/* ── HEARTS ───────────────────────────────────────────── */
.hearts { display: flex; gap: 3px; align-items: center; }
.heart  { font-size: 14px; line-height: 1; }
.heart.full  { color: var(--red); text-shadow: 0 0 6px rgba(255,93,115,0.85); }
.heart.empty { color: #4a3a68; }

/* ── TOP NAVBAR ──────────────────────────────────────── */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 52px;
  background: linear-gradient(180deg, var(--surface-high), var(--surface-low));
  border-bottom: 3px solid var(--outline);
  flex-shrink: 0;
  z-index: 10;
}
#topbar .title {
  font-family: var(--font-head);
  font-size: 18px;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 2px;
  text-shadow: 2px 2px 0 var(--outline);
}
#topbar .icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--on-muted); font-size: 20px; padding: 4px 8px;
  transition: color 0.1s, transform 0.1s;
}
#topbar .icon-btn:hover { color: var(--gold); transform: scale(1.15); }
#topbar .phase-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--gold-text);
  background: var(--gold);
  border: 2px solid var(--outline);
  border-radius: 999px;
  padding: 3px 12px;
  max-width: 160px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── BOTTOM NAVBAR ───────────────────────────────────── */
#navbar {
  display: flex;
  height: 58px;
  background: linear-gradient(0deg, var(--surface-high), var(--surface-low));
  border-top: 3px solid var(--outline);
  flex-shrink: 0;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: none;
  border: none;
  border-right: 2px solid var(--outline);
  color: var(--on-muted);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: color 0.1s, background 0.1s;
}
.nav-btn:last-child { border-right: none; }
.nav-btn:hover { background: var(--surface); color: var(--on-surface); }
.nav-btn.active { color: var(--gold); }
.nav-btn svg { width: 20px; height: 20px; }

/* ── SCREENS ─────────────────────────────────────────── */
.screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.screen.active { display: flex; }

/* ── SETUP SCREEN ────────────────────────────────────── */
#screen-setup { overflow-y: auto; align-items: center; }
#screen-setup .inner {
  width: 100%;
  max-width: 420px;
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.setup-hero {
  text-align: center;
  padding: 44px 0 28px;
}
.setup-hero .bang-title {
  font-family: var(--font-head);
  font-size: 76px;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: -2px;
  text-shadow:
    3px 3px 0 var(--outline), -3px -3px 0 var(--outline),
    3px -3px 0 var(--outline), -3px 3px 0 var(--outline),
    0 10px 24px rgba(255,210,63,0.35);
  line-height: 1;
  animation: title-bounce 2.6s ease-in-out infinite;
  display: inline-block;
}
@keyframes title-bounce {
  0%, 100% { transform: translateY(0) rotate(-1deg); }
  50%      { transform: translateY(-6px) rotate(1deg); }
}
.setup-hero .subtitle {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--purple-acc);
  margin-top: 10px;
  text-transform: uppercase;
}
.setup-card {
  width: 100%;
  margin-bottom: 16px;
  padding: 22px;
  border: 3px solid var(--outline);
  border-radius: 18px;
  background: linear-gradient(180deg, var(--surface-high), var(--surface));
  box-shadow: 0 6px 0 var(--outline), 0 10px 18px var(--shadow);
}
.setup-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 14px;
  text-align: center;
}
.counter-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
}
.counter-btn {
  width: 48px; height: 48px;
  border-radius: 50%;
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 400;
  background: var(--surface-top);
  border: 3px solid var(--outline);
  color: var(--on-surface);
  cursor: pointer;
  box-shadow: 0 4px 0 var(--outline);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s, transform 0.08s;
}
.counter-btn:hover { background: var(--gold); color: var(--gold-text); transform: translateY(-2px); }
.counter-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--outline); }
.counter-val {
  font-family: var(--font-head);
  font-size: 48px;
  font-weight: 400;
  color: var(--gold);
  min-width: 56px;
  text-align: center;
  text-shadow: 2px 2px 0 var(--outline);
}
.pistolero-list { display: flex; flex-direction: column; gap: 12px; }
.pistolero-row { display: flex; flex-direction: column; gap: 5px; }
.pistolero-row label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--on-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.pistolero-row input {
  width: 100%;
  background: var(--surface-low);
  border: 3px solid var(--outline-soft);
  border-radius: 12px;
  color: var(--on-surface);
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 16px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.1s, box-shadow 0.1s;
}
.pistolero-row input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,210,63,0.25); }
.pistolero-row input::placeholder { color: var(--outline-soft); font-weight: 400; }
#btn-iniciar {
  width: 100%;
  padding: 18px;
  font-size: 17px;
  letter-spacing: 2px;
  margin-bottom: 32px;
}

/* ── CHARACTER SELECTION ─────────────────────────────── */
#screen-personaje {
  background: var(--bg-deep);
  overflow-y: auto;
}
#screen-personaje .hero {
  text-align: center;
  padding: 26px 16px 16px;
  border-bottom: 3px solid var(--outline);
  flex-shrink: 0;
}
#screen-personaje h2 {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 400;
  color: var(--gold);
  text-shadow: 2px 2px 0 var(--outline);
}
#screen-personaje .who {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--purple-acc);
  letter-spacing: 2px;
  margin-top: 8px;
  text-transform: uppercase;
}
#personaje-cards-container {
  display: flex;
  gap: 22px;
  padding: 26px 20px;
  justify-content: center;
  align-items: flex-start;
  flex: 1;
  flex-wrap: wrap;
}
.personaje-card-new {
  flex: 0 1 220px;
  min-width: 150px;
  max-width: 280px;
  border: 3px solid var(--outline);
  border-radius: 20px;
  background: var(--surface);
  box-shadow: 0 6px 0 var(--outline), 0 10px 18px var(--shadow);
  cursor: pointer;
  transition: border-color 0.12s, transform 0.12s, box-shadow 0.12s;
  display: flex;
  flex-direction: column;
  user-select: none;
  overflow: hidden;
}
.personaje-card-new:hover {
  border-color: var(--gold);
  transform: translateY(-6px) rotate(-1deg);
  box-shadow: 0 0 0 3px var(--gold), 0 10px 0 var(--outline), 0 16px 22px rgba(255,210,63,0.3);
}
.personaje-card-new.selected {
  border-color: var(--gold);
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 0 0 4px var(--gold), 0 10px 0 var(--outline), 0 0 30px rgba(255,210,63,0.6);
}
.personaje-portrait {
  width: 100%;
  aspect-ratio: 1;
  background: linear-gradient(160deg, var(--surface-top), var(--surface-low));
  border-bottom: 3px solid var(--outline);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-head);
  font-size: 48px;
  font-weight: 400;
  color: var(--purple-acc);
  overflow: hidden;
}
.personaje-portrait img { width: 100%; height: 100%; object-fit: cover; }
.personaje-info { padding: 14px; }
.personaje-info .p-name {
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 400;
  color: var(--gold);
  margin-bottom: 8px;
}
.personaje-info .p-vidas { margin-bottom: 8px; }
.personaje-info .p-desc {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 12px;
  color: var(--on-muted);
  line-height: 1.5;
  border-top: 2px solid var(--outline-soft);
  padding-top: 10px;
}
.personaje-hint {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--outline-soft);
  padding: 14px;
  text-transform: uppercase;
}

/* ── GAME SCREEN ─────────────────────────────────────── */
#screen-game { background: var(--bg-deep); }

/* Rival panels */
#rivals-zone {
  display: flex;
  gap: 10px;
  padding: 12px 10px 8px;
  overflow-x: auto;
  flex-shrink: 0;
  background: linear-gradient(180deg, var(--surface-low), var(--bg-deep));
  border-bottom: 3px solid var(--outline);
  scrollbar-width: none;
}
#rivals-zone::-webkit-scrollbar { display: none; }
.rival-panel {
  flex-shrink: 0;
  width: 112px;
  border: 3px solid var(--outline-soft);
  border-radius: 16px;
  background: var(--surface);
  box-shadow: 0 5px 0 var(--outline), 0 8px 14px var(--shadow);
  cursor: default;
  position: relative;
  transition: border-color 0.1s, transform 0.1s, box-shadow 0.1s;
  overflow: hidden;
}
.rival-panel.muerto { opacity: 0.45; filter: grayscale(0.8); }
.rival-panel.turno  { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,210,63,0.5), 0 5px 0 var(--outline), 0 8px 16px rgba(255,210,63,0.3); }
.rival-panel.seleccionable {
  border-color: var(--green);
  cursor: pointer;
  animation: pulse-border 0.9s infinite;
}
.rival-panel.fuera-alcance { border-color: var(--red); opacity: 0.6; }
.rival-panel.seleccionable:hover { transform: translateY(-4px) scale(1.03); }

@keyframes pulse-border {
  0%, 100% { box-shadow: 0 0 0 2px rgba(72,224,138,0.55), 0 5px 0 var(--outline); }
  50%       { box-shadow: 0 0 0 5px rgba(72,224,138,0.85), 0 5px 0 var(--outline); }
}

.rp-portrait {
  width: 100%;
  aspect-ratio: 1 / 0.85;
  background: linear-gradient(160deg, var(--surface-top), var(--surface-low));
  border-bottom: 2px solid var(--outline-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-head);
  font-size: 24px;
  color: var(--purple-acc);
  overflow: hidden;
  position: relative;
}
.rp-sheriff-badge {
  position: absolute; top: 5px; left: 5px;
  font-family: var(--font-mono); font-size: 9px; font-weight: 700;
  letter-spacing: 0.5px; background: var(--gold); color: var(--gold-text);
  border-radius: 999px; padding: 2px 7px;
}
.rp-body { padding: 7px 7px 5px; }
.rp-name { font-family: var(--font-head); font-size: 10px; font-weight: 400; color: var(--on-surface); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.rp-personaje { font-family: var(--font-mono); font-size: 9px; font-weight: 700; color: var(--purple-acc); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rp-stats { font-family: var(--font-mono); font-size: 9px; font-weight: 700; color: var(--on-muted); margin-top: 4px; }
.rp-badges { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.rp-badge {
  font-family: var(--font-mono); font-size: 8px; font-weight: 700;
  border-radius: 999px; padding: 2px 6px; letter-spacing: 0.5px;
  background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue);
}
.rp-badge-carcel          { background: #3a3550; color: #c7bfe0; border-color: #8a7fbf; }
.rp-badge-mustang         { background: var(--green-dim); color: var(--green); border-color: var(--green); }
.rp-badge-barril          { background: var(--blue-dim); color: var(--blue); border-color: var(--blue); }
.rp-badge-dinamita        { background: var(--red-dim); color: var(--red); border-color: var(--red); }
.rp-badge-miraTelescopica { background: #402a5e; color: var(--purple-acc); border-color: var(--purple-acc); }
.rp-badge-volcanic        { background: #5a4200; color: var(--gold); border-color: var(--gold); }

/* Center play zone */
#play-zone {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 34px;
  padding: 8px;
  position: relative;
  overflow: hidden;
}
.pile { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.pile-label { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--on-muted); text-transform: uppercase; }
.pile-card {
  width: 74px; height: 106px;
  border: 3px solid var(--outline);
  border-radius: 12px;
  background: var(--surface-high);
  box-shadow: 0 5px 0 var(--outline), 0 8px 14px var(--shadow);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.pile-card.back {
  background:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0 6px, transparent 6px 12px),
    linear-gradient(160deg, var(--purple-acc), var(--surface-high) 70%);
}
.pile-card.back::after { content: '★'; font-size: 26px; color: var(--gold); opacity: 0.85; text-shadow: 0 0 8px rgba(255,210,63,0.6); }
.pile-card.face { background: var(--paper); color: var(--ink); border-color: var(--paper-edge); }
.pile-card .pc-nombre { font-family: var(--font-head); font-size: 9px; font-weight: 400; text-align: center; padding: 4px; }
.pile-card .pc-palo { font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-align: center; }

/* Mesa cards (almacen, lucky duke, etc.) */
#mesa-cards { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; align-items: center; }
.mesa-card {
  width: 74px; height: 102px;
  background: var(--paper);
  border: 3px solid var(--paper-edge);
  border-radius: 12px;
  box-shadow: 0 5px 0 var(--outline), 0 8px 14px var(--shadow);
  cursor: pointer;
  display: flex; flex-direction: column; justify-content: space-between; padding: 7px;
  transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
}
.mesa-card:hover { border-color: var(--gold); transform: translateY(-5px) rotate(-2deg) scale(1.04); box-shadow: 0 0 0 3px var(--gold), 0 10px 0 var(--outline), 0 12px 18px rgba(255,210,63,0.35); }
.mesa-card .mc-nombre { font-family: var(--font-head); font-size: 9px; font-weight: 400; color: var(--ink); line-height: 1.2; }
.mesa-card .mc-palo { font-family: var(--font-mono); font-size: 11px; font-weight: 700; }

/* ── HAND ZONE ───────────────────────────────────────── */
#hand-zone {
  flex-shrink: 0;
  height: 132px;
  background: linear-gradient(0deg, var(--surface-low), var(--bg-deep));
  border-top: 3px solid var(--outline);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 8px;
  overflow: visible;
}
#hand-cards {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  position: relative;
  height: 115px;
  width: 100%;
}

/*
 * Hand cards: wrapper+inner pattern.
 * .hc-wrap  → rotation + position + FIXED HEIGHT (card + lift room)
 * .hand-card → visual card, aligned to bottom of wrapper
 *
 * Key: wrapper height (130px) > card height (100px) + lift (24px).
 * When the card lifts, the mouse stays inside the wrapper bounds → no flicker.
 * Hover is on the wrapper, not the card, so hit-test never breaks.
 */
.hc-wrap {
  position: absolute;
  bottom: 0;
  width: 74px;
  height: 130px;            /* tall enough to contain lifted card */
  transform-origin: bottom center;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.hand-card {
  width: 74px;
  height: 100px;
  background: var(--paper);
  border: 3px solid var(--paper-edge);
  border-radius: 12px;
  box-shadow: 0 5px 0 var(--outline), 0 8px 14px var(--shadow);
  cursor: default;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 6px;
  transition: transform 0.15s, border-color 0.1s, box-shadow 0.15s;
  flex-shrink: 0;
}
.hand-card.jugable { cursor: pointer; }
/* Hover: wrapper sube en z-index (CSS, no JS) y carta sube y gira ligeramente.
   El wrapper tiene 130px de alto, la carta 100px → cuando sube 24px
   sigue dentro del wrapper → el ratón no sale → sin parpadeo. */
.hc-wrap:hover {
  z-index: 100;
}
.hc-wrap:hover .hand-card.jugable {
  transform: translateY(-24px) scale(1.07) rotate(-2deg);
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold), 0 8px 0 var(--outline), 0 14px 20px rgba(255,210,63,0.4);
}
.hand-card .hc-nombre { font-family: var(--font-head); font-size: 8px; font-weight: 400; color: var(--ink); line-height: 1.2; }
.hand-card .hc-tipo  { font-family: var(--font-mono); font-size: 8px; font-weight: 700; color: #8a6a30; }
.hand-card.tipo-arma   { border-color: var(--blue); background: #e3f6ff; }
.hand-card.tipo-objeto { border-color: var(--green); background: #e4fbef; }

/* Rival card (hidden / equip) */
.rival-card-hidden {
  width: 46px; height: 64px;
  background: var(--surface-high); border: 3px solid var(--outline-soft);
  border-radius: 10px;
  box-shadow: 0 4px 0 var(--outline); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--gold); opacity: 0.8; flex-shrink: 0;
  transition: transform 0.1s, opacity 0.1s;
}
.rival-card-hidden:hover { border-color: var(--gold); opacity: 1; transform: translateY(-3px); }
.rival-card-equip {
  width: 66px; height: 90px; background: var(--paper);
  border: 3px solid var(--paper-edge); border-radius: 10px;
  box-shadow: 0 4px 0 var(--outline);
  cursor: pointer; padding: 6px; flex-shrink: 0;
  transition: transform 0.1s, border-color 0.1s;
}
.rival-card-equip:hover { border-color: var(--gold); transform: translateY(-3px); }
.rival-card-equip .rce-nombre { font-family: var(--font-head); font-size: 8px; font-weight: 400; color: var(--ink); }
.rival-card-equip .rce-badge  { font-family: var(--font-mono); font-size: 8px; font-weight: 700; color: var(--paper-edge); margin-top: 4px; }

/* ── PROMPT BAR ──────────────────────────────────────── */
#prompt-bar {
  flex-shrink: 0;
  background: linear-gradient(0deg, var(--surface-low), var(--surface));
  border-top: 3px solid var(--outline);
  border-radius: 18px 18px 0 0;
  padding: 12px 14px;
  min-height: 76px;
}
#prompt-texto {
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 13px;
  color: var(--on-surface);
  margin-bottom: 10px;
  line-height: 1.4;
  min-height: 18px;
}
#prompt-botones { display: flex; gap: 8px; flex-wrap: wrap; }
.prompt-btn {
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border: 3px solid var(--outline);
  border-radius: 12px;
  background: var(--surface-top);
  color: var(--on-surface);
  padding: 9px 18px;
  cursor: pointer;
  box-shadow: 0 4px 0 var(--outline);
  transition: background 0.1s, transform 0.08s, box-shadow 0.08s;
}
.prompt-btn:hover  { background: var(--gold); color: var(--gold-text); transform: translateY(-2px); box-shadow: 0 6px 0 var(--gold-dim); }
.prompt-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--outline); }
.prompt-btn.fin    { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.prompt-btn.fin:hover    { background: var(--green); color: var(--ink); box-shadow: 0 6px 0 var(--green-dim); }
.prompt-btn.poder  { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
.prompt-btn.poder:hover  { background: var(--blue); color: var(--ink); box-shadow: 0 6px 0 var(--blue-dim); }
.prompt-btn.cancel { background: var(--red-dim); border-color: var(--red); color: var(--red); }
.prompt-btn.cancel:hover { background: var(--red); color: var(--ink); box-shadow: 0 6px 0 var(--red-dim); }
/* Disabled/sending state */
.prompt-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
#prompt-bar.sending #prompt-texto::after {
  content: ' ▌';
  color: var(--gold);
  animation: blink 0.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── LOG DRAWER ──────────────────────────────────────── */
#log-drawer {
  position: fixed;
  bottom: 58px; left: 0; right: 0;
  height: 45vh;
  background: var(--surface-low);
  border-top: 3px solid var(--outline);
  border-radius: 18px 18px 0 0;
  z-index: 50;
  display: none;
  flex-direction: column;
}
#log-drawer.open { display: flex; }
#log-drawer-header {
  padding: 10px 14px;
  border-bottom: 2px solid var(--outline-soft);
  display: flex; justify-content: space-between; align-items: center;
}
#log-drawer-header span { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; }
#log-msgs { flex: 1; overflow-y: auto; padding: 10px 14px; font-family: var(--font-mono); font-weight: 600; font-size: 11px; color: var(--on-muted); line-height: 1.6; }
.log-msg { padding: 3px 0; border-bottom: 1px solid var(--surface-high); }
.log-msg.important { color: var(--gold); font-weight: 700; }

/* ── MENU MODAL ──────────────────────────────────────── */
#menu-modal { display: none; position: fixed; inset: 0; background: rgba(10,6,20,0.85); z-index: 100; align-items: center; justify-content: center; }
#menu-modal.open { display: flex; }
#menu-content { width: 280px; border: 3px solid var(--outline); border-radius: 18px; background: var(--surface); box-shadow: 0 8px 0 var(--outline), 0 16px 26px var(--shadow); overflow: hidden; }
#menu-content .menu-title { font-family: var(--font-head); font-size: 14px; font-weight: 400; letter-spacing: 1px; color: var(--gold); padding: 16px 18px; border-bottom: 2px solid var(--outline-soft); text-transform: uppercase; }
.menu-item { display: block; width: 100%; padding: 15px 18px; font-family: var(--font-mono); font-size: 12px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; background: none; border: none; border-bottom: 1px solid var(--surface-high); color: var(--on-surface); cursor: pointer; text-align: left; transition: background 0.1s, color 0.1s; }
.menu-item:hover { background: var(--surface-high); color: var(--gold); }
.menu-item.danger { color: var(--red); }
.menu-item.danger:hover { background: var(--red-dim); color: #fff; }

/* ── GAME OVER ───────────────────────────────────────── */
#screen-gameover {
  align-items: center;
  justify-content: center;
  gap: 18px;
  padding: 24px 16px;
  overflow-y: auto;
}
#screen-gameover h1 { font-family: var(--font-head); font-size: 26px; font-weight: 400; color: var(--gold); text-shadow: 3px 3px 0 var(--outline); text-align: center; }
#go-ganador { font-family: var(--font-mono); font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--purple-acc); text-transform: uppercase; text-align: center; }
#go-tabla { width: 100%; max-width: 480px; border-collapse: separate; border-spacing: 0; border: 3px solid var(--outline); border-radius: 14px; overflow: hidden; }
#go-tabla th { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--gold-text); background: var(--gold); padding: 9px 10px; text-align: left; text-transform: uppercase; }
#go-tabla td { font-family: var(--font-body); font-weight: 700; font-size: 13px; padding: 9px 10px; border-bottom: 1px solid var(--surface-high); background: var(--surface); }
#go-tabla tr.vivo td  { color: var(--green); }
#go-tabla tr.muerto td { color: var(--red); opacity: 0.75; }

/* ── LAYOUT WRAPPER ──────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; }
</style>
</head>
<body>
<div id="app" class="dither-bg">

  <!-- TOP BAR -->
  <div id="topbar" style="display:none">
    <button class="icon-btn" onclick="toggleMenu()">☰</button>
    <span class="title">BANG!</span>
    <span id="phase-badge" class="phase-badge"></span>
  </div>

  <!-- SETUP SCREEN -->
  <div id="screen-setup" class="screen active dither-bg">
    <div class="inner">
      <div class="setup-hero">
        <div class="bang-title">BANG!</div>
        <div class="subtitle">★ &nbsp; DUELO AL AMANECER &nbsp; ★</div>
      </div>

      <div class="setup-card">
        <div class="setup-label">Cantidad de pistoleros</div>
        <div class="counter-row">
          <button class="counter-btn" onclick="cambiarJugadores(-1)">−</button>
          <div class="counter-val" id="counter-display">4</div>
          <button class="counter-btn" onclick="cambiarJugadores(1)">+</button>
        </div>
      </div>

      <div class="setup-card">
        <div class="setup-label">Nombres</div>
        <div class="pistolero-list" id="nombres-container"></div>
      </div>

      <button class="pixel-btn primary" id="btn-iniciar" onclick="iniciarPartida()">
        COMENZAR PARTIDA
      </button>
    </div>
  </div>

  <!-- CHARACTER SELECTION SCREEN -->
  <div id="screen-personaje" class="screen dither-bg">
    <div class="hero">
      <h2>ELIGE TU DESTINO</h2>
      <div id="personaje-quien" class="who"></div>
    </div>
    <div id="personaje-cards-container"></div>
    <div class="personaje-hint">Pulsa una carta para elegir</div>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="screen dither-floor">
    <div id="rivals-zone"></div>
    <div id="play-zone">
      <div class="pile">
        <div class="pile-label">MAZO</div>
        <div class="pile-card back"></div>
      </div>
      <div id="mesa-cards"></div>
      <div class="pile">
        <div class="pile-label">DESCARTE</div>
        <div class="pile-card face" id="discard-pile" style="display:none;"></div>
        <div class="pile-card back" id="discard-empty"></div>
      </div>
    </div>
    <div id="hand-zone">
      <div id="hand-cards"></div>
    </div>
    <div id="prompt-bar">
      <div id="prompt-texto"></div>
      <div id="prompt-botones"></div>
    </div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="screen-gameover" class="screen dither-bg">
    <h1>DUELO FINALIZADO</h1>
    <div id="go-ganador"></div>
    <table id="go-tabla">
      <tr><th>Pistolero</th><th>Personaje</th><th>Rol</th><th>Estado</th></tr>
    </table>
    <button class="pixel-btn primary" onclick="location.reload()" style="width:100%;max-width:480px;padding:14px;font-size:14px;letter-spacing:2px;">
      VOLVER A LA CANTINA
    </button>
  </div>

  <!-- BOTTOM NAVBAR -->
  <div id="navbar" style="display:none;">
    <button class="nav-btn" id="nav-log" onclick="toggleLog()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h10"/></svg>
      LOG
    </button>
    <button class="nav-btn" id="nav-menu" onclick="toggleMenu()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      MENÚ
    </button>
  </div>

</div><!-- #app -->

<!-- LOG DRAWER -->
<div id="log-drawer">
  <div id="log-drawer-header">
    <span>📋 Log de partida</span>
    <button class="pixel-btn ghost" style="padding:4px 10px;font-size:11px;" onclick="toggleLog()">✕</button>
  </div>
  <div id="log-msgs"></div>
</div>

<!-- MENU MODAL -->
<div id="menu-modal">
  <div id="menu-content">
    <div class="menu-title">⚙ Menú</div>
    <button class="menu-item" onclick="toggleMenu()">Continuar partida</button>
    <button class="menu-item danger" onclick="location.reload()">Nueva partida</button>
    <button class="menu-item" onclick="toggleMenu()">Cancelar</button>
  </div>
</div>

<script>
// ── Estado global ─────────────────────────────────────
let numJugadores = 4;
let pollInterval = null;
let logCount = 0;
let isSending = false;
let lastPreguntaKey = null;   // evita re-render si la pregunta no cambió
window._ultimoEstado = null;

// ── SETUP ─────────────────────────────────────────────
function cambiarJugadores(delta) {
  numJugadores = Math.max(4, Math.min(7, numJugadores + delta));
  document.getElementById('counter-display').textContent = numJugadores;
  generarNombres();
}

function generarNombres() {
  const c = document.getElementById('nombres-container');
  c.innerHTML = '';
  for (let i = 1; i <= numJugadores; i++) {
    const row = document.createElement('div');
    row.className = 'pistolero-row';
    row.innerHTML = `<label>Pistolero ${i}</label>
      <input id="nombre-${i}" placeholder="Nombre del jugador ${i}" autocomplete="off">`;
    c.appendChild(row);
  }
}
generarNombres();

async function iniciarPartida() {
  const btn = document.getElementById('btn-iniciar');
  btn.textContent = 'CARGANDO...';
  btn.disabled = true;

  const nombres = [];
  for (let i = 1; i <= numJugadores; i++) {
    const v = document.getElementById(`nombre-${i}`)?.value.trim();
    nombres.push(v || `Pistolero ${i}`);
  }
  await fetch('/nueva_partida', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({num_players: numJugadores, nombres})
  });
  showGameUI();
  startPolling();
}

function showGameUI() {
  document.getElementById('screen-setup').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('navbar').style.display = 'flex';
}

// ── NAVEGACIÓN ────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function toggleLog() {
  document.getElementById('log-drawer').classList.toggle('open');
  document.getElementById('nav-log').classList.toggle('active');
}
function toggleMenu() {
  document.getElementById('menu-modal').classList.toggle('open');
}

// ── NAIPES — símbolo y color por palo ──────────────────
function suitInfo(palo) {
  const map = {
    'Corazones': { symbol: '♥', cls: 'suit-red' },
    'Diamantes': { symbol: '♦', cls: 'suit-red' },
    'Picas':     { symbol: '♠', cls: 'suit-black' },
    'Treboles':  { symbol: '♣', cls: 'suit-black' },
  };
  return map[palo] || { symbol: '', cls: '' };
}
function paloHTML(palo, numero) {
  const s = suitInfo(palo);
  return `<span class="${s.cls}">${s.symbol} ${numero ?? ''}</span>`;
}

// ── POLLING — 200ms para respuesta rápida ─────────────
function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(poll, 200);
}

function preguntaKey(preg) {
  if (!preg) return null;
  // Incluye todos los campos que pueden cambiar entre preguntas del mismo tipo
  // (ej: Almacén — mismo tipo, pero lista de cartas se reduce por turno)
  return JSON.stringify({
    tipo:       preg.tipo,
    texto:      preg.texto || '',
    opciones:   preg.opciones || [],
    jugador_id: preg.jugador_id ?? null,
    cartas:     (preg.cartas || []).map(c => c.nombre),
    mano:       (preg.mano   || []).map(c => c.nombre + c.indice),
    mano_size:  preg.mano_size ?? null,
  });
}

async function poll() {
  try {
    const res = await fetch('/estado');
    const data = await res.json();

    if (data.error) {
      setPromptText('💥 ' + data.error, true);
      clearInterval(pollInterval);
      return;
    }
    if (data.estado?.jugadores) {
      window._ultimoEstado = data.estado;
      renderEstado(data.estado);
      renderDescarte(data.estado.descarte_top);
    }
    if (data.log) renderLog(data.log);

    // Solo re-renderizar la pregunta si realmente cambió
    // Esto evita reconstruir el DOM cada 200ms mientras el usuario está eligiendo
    const key = preguntaKey(data.pregunta);
    if (key !== lastPreguntaKey) {
      lastPreguntaKey = key;
      if (data.pregunta) renderPregunta(data.pregunta);
      else clearPrompt();
    }
  } catch(e) { /* ignora errores de red transitorios */ }
}

// ── ACCIÓN — debounce + re-poll inmediato ─────────────
async function enviarAccion(valor) {
  if (isSending) return;
  isSending = true;

  // Desactiva UI inmediatamente para dar feedback visual
  setSendingState(true);
  limpiarPaneles();

  try {
    await fetch('/accion', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({valor})
    });
    // Forzar re-render en el próximo poll aunque la pregunta parezca igual
    lastPreguntaKey = null;
    await poll();
  } finally {
    isSending = false;
    setSendingState(false);
  }
}

function setSendingState(on) {
  const bar = document.getElementById('prompt-bar');
  bar.classList.toggle('sending', on);
  bar.querySelectorAll('.prompt-btn').forEach(b => b.disabled = on);
  // Deshabilita también wrappers de mano
  document.querySelectorAll('.hc-wrap').forEach(w => {
    w.style.pointerEvents = on ? 'none' : '';
  });
  // Deshabilita cartas de mesa
  document.querySelectorAll('.mesa-card, .rival-card-hidden, .rival-card-equip').forEach(c => {
    c.style.pointerEvents = on ? 'none' : '';
  });
}

// ── RENDER TABLERO ────────────────────────────────────
function renderEstado(estado) {
  const n = estado.jugadores.length;
  const turnoActual = ((estado.turno_actual % n) + n) % n;

  const jugTurno = estado.jugadores[turnoActual];
  if (jugTurno) document.getElementById('phase-badge').textContent = jugTurno.nombre.toUpperCase();

  const zone = document.getElementById('rivals-zone');
  // Rebuild only when player count changes
  if (zone.children.length !== n) zone.innerHTML = '';

  estado.jugadores.forEach(j => {
    let panel = zone.querySelector(`[data-id="${j.id}"]`);
    if (!panel) {
      panel = document.createElement('div');
      panel.className = 'rival-panel';
      panel.dataset.id = j.id;
      zone.appendChild(panel);
    }

    const wasTurno = panel.classList.contains('turno');
    const isTurno = j.id === turnoActual;
    panel.className = 'rival-panel'
      + (j.muerto ? ' muerto' : '')
      + (isTurno  ? ' turno'  : '');

    const initials = j.nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const sheriffBadge = j.rol === 'Sheriff' ? '<div class="rp-sheriff-badge">SHERIFF</div>' : '';
    const rolShow = j.muerto && j.rol !== '?'
      ? `<div style="font-family:var(--font-mono);font-size:8px;font-weight:700;color:var(--red);margin-top:2px;">${j.rol.toUpperCase()}</div>` : '';

    let hearts = '<div class="hearts">';
    for (let i = 0; i < j.vidasMax; i++)
      hearts += `<span class="heart ${i < j.vidas ? 'full' : 'empty'}">♥</span>`;
    hearts += '</div>';

    const armaNames = {0:'COLT',1:'VOLC',2:'SCHO',3:'REMI',4:'CARA',5:'WINC'};
    const arma = armaNames[j.arma] ?? j.arma;

    const badgeMap = {carcel:'CÁRC',mustang:'MUST',barril:'BARR',dinamita:'DINA',miraTelescopica:'MIRA',volcanic:'VOLC'};
    let badges = '<div class="rp-badges">';
    const estados = j.estados || {};
    for (const [k, lbl] of Object.entries(badgeMap))
      if (estados[k]) badges += `<span class="rp-badge rp-badge-${k}">${lbl}</span>`;
    badges += '</div>';

    panel.innerHTML = `
      <div class="rp-portrait">${sheriffBadge}${initials}</div>
      <div class="rp-body">
        <div class="rp-name">${j.nombre}</div>
        <div class="rp-personaje">${j.personaje}</div>
        ${rolShow}
        ${hearts}
        <div class="rp-stats">${arma} · Rng ${j.distancia} · ${j.numCartas}🂠</div>
        ${badges}
      </div>`;
  });
}

// ── RENDER MANO — wrapper pattern sin jitter ──────────
function renderMano(mano, opciones, jugable) {
  const c = document.getElementById('hand-cards');
  c.innerHTML = '';
  if (!mano || mano.length === 0) return;

  const total = mano.length;
  const spread = Math.min(total * 30, 340);
  const step = total > 1 ? spread / (total - 1) : 0;
  const startX = -spread / 2;
  const maxAngle = Math.min(total * 3.5, 22);

  mano.forEach((carta, i) => {
    const esJugable = jugable && opciones.includes(String(carta.indice + 1));
    const tipoCls = carta.tipo === 'Arma' ? ' tipo-arma' : carta.tipo === 'Objeto' ? ' tipo-objeto' : '';
    const angle = total > 1 ? (i / (total - 1) - 0.5) * maxAngle * 2 : 0;
    const x = startX + i * step;

    // Wrapper: holds rotation (stays fixed on hover)
    // z-index NO se pone inline — lo gestiona CSS :hover para evitar conflictos
    const wrap = document.createElement('div');
    wrap.className = 'hc-wrap';
    wrap.style.left = `calc(50% + ${x}px - 37px)`;
    wrap.style.transform = `rotate(${angle}deg)`;

    // Inner card: only does translateY on hover
    const div = document.createElement('div');
    div.className = 'hand-card' + tipoCls + (esJugable ? ' jugable' : '');
    div.innerHTML = `<div class="hc-nombre">${carta.nombre}</div><div class="hc-tipo">${carta.tipo}</div>`;

    if (esJugable) {
      wrap.onclick = () => enviarAccion(String(carta.indice + 1));
    }

    wrap.appendChild(div);
    c.appendChild(wrap);
  });
}

// ── RENDER PREGUNTA ───────────────────────────────────
function renderPregunta(preg) {
  if (!preg) return;
  const tipo = preg.tipo;

  if (tipo === 'elegir_personaje') { renderElegirPersonaje(preg); return; }
  if (tipo === 'game_over')        { renderGameOver(preg); return; }

  showScreen('screen-game');
  limpiarPaneles();
  document.getElementById('mesa-cards').innerHTML = '';

  if (tipo === 'elegir_carta') {
    setPromptText(preg.texto);
    renderMano(preg.mano || [], preg.opciones, true);
    const bots = document.getElementById('prompt-botones');
    bots.innerHTML = '';
    if (preg.permitir_poder)
      bots.appendChild(mkPromptBtn('⚡ PODER', 'poder', () => enviarAccion('PODER')));
    if (preg.permitir_fin)
      bots.appendChild(mkPromptBtn('✓ FIN DE TURNO', 'fin', () => enviarAccion('FIN')));
    return;
  }

  if (tipo === 'elegir_jugador') {
    setPromptText(preg.texto);
    clearBotones();
    marcarPaneles(preg.jugadores_validos, preg.jugadores_fuera_alcance || []);
    document.getElementById('prompt-botones').appendChild(
      mkPromptBtn('✕ CANCELAR', 'cancel', () => { limpiarPaneles(); enviarAccion('None'); })
    );
    return;
  }

  if (tipo === 'elegir_carta_rival') {
    setPromptText(preg.texto);
    clearBotones();
    const mesa = document.getElementById('mesa-cards');
    for (let i = 0; i < preg.mano_size; i++) {
      const d = document.createElement('div');
      d.className = 'rival-card-hidden';
      d.textContent = '🂠';
      d.onclick = () => enviarAccion(`mano:${i}`);
      mesa.appendChild(d);
    }
    (preg.equipadas || []).forEach(c => {
      const d = document.createElement('div');
      d.className = 'rival-card-equip';
      d.innerHTML = `<div class="rce-nombre">${c.nombre}</div><div class="rce-badge">EQUIPADA</div>`;
      d.onclick = () => enviarAccion(`equipo:${c.indice}`);
      mesa.appendChild(d);
    });
    return;
  }

  if (tipo === 'elegir_lucky_duke') {
    setPromptText('Lucky Duke: elige el resultado del desenfunde');
    clearBotones();
    const mesa = document.getElementById('mesa-cards');
    [preg.carta1, preg.carta2].forEach((c, i) => {
      const d = document.createElement('div');
      d.className = 'mesa-card';
      d.innerHTML = `<div class="mc-nombre">${c.nombre}</div><div class="mc-palo">${paloHTML(c.palo, c.numero)}</div>`;
      d.onclick = () => enviarAccion(String(i));
      mesa.appendChild(d);
    });
    return;
  }

  if (tipo === 'elegir_almacen_carta' || tipo === 'elegir_kit_carlson') {
    setPromptText(tipo === 'elegir_kit_carlson'
      ? 'Kit Carlson: elige la carta a devolver al mazo'
      : 'Almacén: elige una carta');
    clearBotones();
    const mesa = document.getElementById('mesa-cards');
    (preg.cartas || []).forEach((c, i) => {
      const d = document.createElement('div');
      d.className = 'mesa-card';
      d.innerHTML = `<div class="mc-nombre">${c.nombre}</div><div class="mc-palo">${paloHTML(c.palo, c.numero)}</div>`;
      d.onclick = () => enviarAccion(String(i));
      mesa.appendChild(d);
    });
    return;
  }

  if (tipo === 'elegir_robo_pedro') {
    setPromptText('Pedro Ramírez: ¿coges la carta del descarte?');
    const mesa = document.getElementById('mesa-cards');
    const c = preg.carta_top;
    const d = document.createElement('div');
    d.className = 'mesa-card';
    d.innerHTML = `<div class="mc-nombre">${c.nombre}</div><div class="mc-palo">${paloHTML(c.palo, c.numero)}</div>`;
    mesa.appendChild(d);
    const bots = document.getElementById('prompt-botones');
    bots.innerHTML = '';
    bots.appendChild(mkPromptBtn('COGER DESCARTE', 'fin',  () => enviarAccion('SI')));
    bots.appendChild(mkPromptBtn('DEL MAZO',       '',    () => enviarAccion('NO')));
    return;
  }

  if (tipo === 'elegir_robo_jesse') {
    setPromptText('Jesse Jones: ¿robas de un rival o del mazo?');
    clearBotones();
    marcarPaneles(preg.rivales, []);
    document.getElementById('prompt-botones').appendChild(
      mkPromptBtn('DEL MAZO', '', () => { limpiarPaneles(); enviarAccion('None'); })
    );
    return;
  }

  // Prompt genérico
  setPromptText(preg.texto);
  const bots = document.getElementById('prompt-botones');
  bots.innerHTML = '';
  (preg.opciones || []).forEach(opt => {
    bots.appendChild(mkPromptBtn(opt, '', () => enviarAccion(opt)));
  });
}

// ── CHARACTER SELECTION — click en carta = confirmar ──
function renderElegirPersonaje(preg) {
  showScreen('screen-personaje');
  document.getElementById('personaje-quien').textContent =
    `${preg.nombre_jugador} · ${preg.rol}`;

  const c = document.getElementById('personaje-cards-container');
  c.innerHTML = '';

  [preg.personaje_a, preg.personaje_b].forEach((p, i) => {
    const val = i === 0 ? 'A' : 'B';
    const div = document.createElement('div');
    div.className = 'personaje-card-new';

    let heartsHTML = '<div class="hearts">';
    for (let v = 0; v < p.vidas; v++) heartsHTML += '<span class="heart full">♥</span>';
    heartsHTML += '</div>';

    const initials = p.nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    div.innerHTML = `
      <div class="personaje-portrait">${initials}</div>
      <div class="personaje-info">
        <div class="p-name">${p.nombre}</div>
        <div class="p-vidas">${heartsHTML}</div>
        <div class="p-desc">${p.desc}</div>
      </div>`;

    // Click en la carta = elegir directamente, sin botón extra
    div.onclick = () => {
      if (isSending) return;
      div.classList.add('selected');
      // Delay visual breve para que se vea la selección antes de cambiar pantalla
      setTimeout(() => {
        showScreen('screen-game');
        enviarAccion(val);
      }, 160);
    };

    c.appendChild(div);
  });
}

// ── GAME OVER ─────────────────────────────────────────
function renderGameOver(preg) {
  clearInterval(pollInterval);
  showScreen('screen-gameover');
  document.getElementById('go-ganador').textContent =
    `¡${preg.ganador.toUpperCase()} HAN GANADO!`;

  const estado = window._ultimoEstado;
  if (estado) {
    const tbody = document.getElementById('go-tabla');
    tbody.innerHTML = '<tr><th>Pistolero</th><th>Personaje</th><th>Rol</th><th>Estado</th></tr>';
    estado.jugadores.forEach(j => {
      const tr = document.createElement('tr');
      tr.className = j.muerto ? 'muerto' : 'vivo';
      tr.innerHTML = `<td>${j.nombre}</td><td>${j.personaje}</td><td>${j.rol}</td><td>${j.muerto ? '💀 Caído' : '✅ Vivo'}</td>`;
      tbody.appendChild(tr);
    });
  }
  enviarAccion('ok');
}

// ── LOG ───────────────────────────────────────────────
function renderLog(msgs) {
  if (msgs.length === logCount) return;
  logCount = msgs.length;
  const c = document.getElementById('log-msgs');
  c.innerHTML = '';
  msgs.forEach(m => {
    const d = document.createElement('div');
    d.className = 'log-msg' + (m.includes('---') || m.includes('HAN') ? ' important' : '');
    d.textContent = m;
    c.appendChild(d);
  });
  c.scrollTop = c.scrollHeight;
}

// ── HELPERS ───────────────────────────────────────────
function mkPromptBtn(texto, cls, fn) {
  const b = document.createElement('button');
  b.className = 'prompt-btn ' + cls;
  b.textContent = texto;
  b.onclick = fn;
  return b;
}

function setPromptText(txt, error = false) {
  const el = document.getElementById('prompt-texto');
  el.textContent = txt;
  el.style.color = error ? 'var(--red)' : '';
}

function clearBotones() {
  document.getElementById('prompt-botones').innerHTML = '';
}

function marcarPaneles(idsValidos, idsFuera) {
  document.querySelectorAll('.rival-panel').forEach(panel => {
    const id = parseInt(panel.dataset.id);
    if (idsValidos.includes(id)) {
      panel.classList.add('seleccionable');
      panel.onclick = () => { limpiarPaneles(); enviarAccion(String(id)); };
    } else if (idsFuera.includes(id)) {
      panel.classList.add('fuera-alcance');
    }
  });
}

function limpiarPaneles() {
  document.querySelectorAll('.rival-panel').forEach(p => {
    p.classList.remove('seleccionable', 'fuera-alcance');
    p.onclick = null;
  });
}

function renderDescarte(carta) {
  const face = document.getElementById('discard-pile');
  const back = document.getElementById('discard-empty');
  if (carta) {
    face.style.display = '';
    back.style.display = 'none';
    face.innerHTML = `<div class="pc-nombre">${carta.nombre}</div><div class="pc-palo">${paloHTML(carta.palo, carta.numero)}</div>`;
  } else {
    face.style.display = 'none';
    back.style.display = '';
  }
}
</script>
