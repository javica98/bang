<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BANG!</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Courier+Prime:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:           #171210;
  --surface-low:  #201a18;
  --surface:      #241e1c;
  --surface-high: #2f2926;
  --surface-top:  #3a3331;
  --on-surface:   #ece0dc;
  --on-muted:     #d2c5ac;
  --outline:      #9b8f78;
  --outline-dim:  #4f4633;
  --primary:      #ffc821;
  --primary-dim:  #f5bf12;
  --primary-text: #3e2e00;
  --secondary:    #7a4f47;
  --red:          #b1111b;
  --red-dim:      #3a1010;
  --paper:        #f0e6c8;
  --shadow:       rgba(0,0,0,0.7);
  --font-head:    'Space Mono', monospace;
  --font-body:    'Courier Prime', monospace;
  --font-mono:    'JetBrains Mono', monospace;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--on-surface);
  image-rendering: pixelated;
}

/* ── DITHER PATTERNS ─────────────────────────────────── */
.dither-bg {
  background-image:
    repeating-linear-gradient(90deg,
      rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px,
      transparent 1px, transparent 48px),
    repeating-linear-gradient(0deg,
      rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 1px,
      transparent 1px, transparent 4px);
  background-color: var(--bg);
}
.dither-floor {
  background-image:
    repeating-linear-gradient(0deg,
      rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px,
      transparent 1px, transparent 3px);
  background-color: var(--surface-low);
}

/* ── PIXEL BUTTONS ───────────────────────────────────── */
.pixel-btn {
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 2px solid var(--outline);
  background: var(--surface-high);
  color: var(--on-surface);
  padding: 10px 20px;
  cursor: pointer;
  border-radius: 0;
  box-shadow: 4px 4px 0 var(--shadow);
  transition: background 0.1s, color 0.1s, transform 0.05s;
  user-select: none;
}
.pixel-btn:hover  { background: var(--primary); color: var(--primary-text); border-color: var(--primary); }
.pixel-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--shadow); }
.pixel-btn.primary { background: var(--primary); color: var(--primary-text); border-color: var(--primary-dim); }
.pixel-btn.primary:hover { background: var(--primary-dim); }
.pixel-btn.ghost   { background: transparent; border-color: var(--outline-dim); color: var(--on-muted); }
.pixel-btn.ghost:hover { background: var(--surface-high); color: var(--on-surface); }

/* ── PIXEL HEARTS ────────────────────────────────────── */
.hearts { display: flex; gap: 3px; align-items: center; }
.heart  { font-size: 13px; line-height: 1; }
.heart.full  { color: var(--red); text-shadow: 0 0 4px var(--red); }
.heart.empty { color: var(--red-dim); }

/* ── TOP NAVBAR ──────────────────────────────────────── */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 48px;
  background: var(--surface-low);
  border-bottom: 2px solid var(--outline-dim);
  flex-shrink: 0;
  z-index: 10;
}
#topbar .title {
  font-family: var(--font-head);
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 3px;
}
#topbar .icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--on-muted); font-size: 20px; padding: 4px 8px;
}
#topbar .icon-btn:hover { color: var(--on-surface); }
#topbar .phase-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--primary);
  background: var(--primary-text);
  border: 1px solid var(--primary-dim);
  padding: 2px 8px;
  max-width: 160px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── BOTTOM NAVBAR ───────────────────────────────────── */
#navbar {
  display: flex;
  height: 56px;
  background: var(--surface-low);
  border-top: 2px solid var(--outline-dim);
  flex-shrink: 0;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: none;
  border: none;
  border-right: 1px solid var(--outline-dim);
  color: var(--on-muted);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.nav-btn:last-child { border-right: none; }
.nav-btn:hover { background: var(--surface); color: var(--on-surface); }
.nav-btn.active { color: var(--primary); }
.nav-btn svg { width: 20px; height: 20px; }

/* ── SCREENS ─────────────────────────────────────────── */
.screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.screen.active { display: flex; }

/* ── SETUP SCREEN ────────────────────────────────────── */
#screen-setup { overflow-y: auto; align-items: center; }
#screen-setup .inner {
  width: 100%;
  max-width: 420px;
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.setup-hero {
  text-align: center;
  padding: 40px 0 28px;
}
.setup-hero .bang-title {
  font-family: var(--font-head);
  font-size: 72px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: -4px;
  text-shadow: 6px 6px 0 rgba(0,0,0,0.8), -2px -2px 0 #7a4500;
  line-height: 1;
}
.setup-hero .subtitle {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 5px;
  color: var(--on-muted);
  margin-top: 8px;
  text-transform: uppercase;
}
.setup-card {
  width: 100%;
  margin-bottom: 16px;
  padding: 20px;
  border: 2px solid var(--outline-dim);
  background: var(--surface);
  box-shadow: 4px 4px 0 var(--shadow);
}
.setup-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--on-muted);
  text-transform: uppercase;
  margin-bottom: 14px;
  text-align: center;
}
.counter-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
}
.counter-btn {
  width: 48px; height: 48px;
  font-family: var(--font-head);
  font-size: 24px;
  font-weight: 700;
  background: var(--surface-high);
  border: 2px solid var(--outline);
  color: var(--on-surface);
  cursor: pointer;
  box-shadow: 3px 3px 0 var(--shadow);
  display: flex; align-items: center; justify-content: center;
}
.counter-btn:hover { background: var(--primary); color: var(--primary-text); }
.counter-val {
  font-family: var(--font-head);
  font-size: 48px;
  font-weight: 700;
  color: var(--primary);
  min-width: 56px;
  text-align: center;
}
.pistolero-list { display: flex; flex-direction: column; gap: 10px; }
.pistolero-row { display: flex; flex-direction: column; gap: 4px; }
.pistolero-row label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--on-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.pistolero-row input {
  width: 100%;
  background: var(--surface-low);
  border: 2px solid var(--outline-dim);
  color: var(--on-surface);
  font-family: var(--font-body);
  font-size: 16px;
  padding: 10px 12px;
  border-radius: 0;
  outline: none;
}
.pistolero-row input:focus { border-color: var(--primary); }
.pistolero-row input::placeholder { color: var(--outline); }
#btn-iniciar {
  width: 100%;
  padding: 16px;
  font-size: 16px;
  letter-spacing: 3px;
  margin-bottom: 32px;
}

/* ── CHARACTER SELECTION ─────────────────────────────── */
#screen-personaje {
  background: var(--bg);
  overflow-y: auto;
}
#screen-personaje .hero {
  text-align: center;
  padding: 24px 16px 16px;
  border-bottom: 2px solid var(--outline-dim);
  flex-shrink: 0;
}
#screen-personaje h2 {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
}
#screen-personaje .who {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--on-muted);
  letter-spacing: 2px;
  margin-top: 6px;
  text-transform: uppercase;
}
#personaje-cards-container {
  display: flex;
  gap: 20px;
  padding: 24px 20px;
  justify-content: center;
  align-items: flex-start;
  flex: 1;
  flex-wrap: wrap;
}
/* Card width: min 160px, max ~45% on wide screens */
.personaje-card-new {
  flex: 0 1 220px;
  min-width: 150px;
  max-width: 280px;
  border: 3px solid var(--outline-dim);
  background: var(--surface);
  box-shadow: 5px 5px 0 var(--shadow);
  cursor: pointer;
  transition: border-color 0.12s, transform 0.12s, box-shadow 0.12s;
  display: flex;
  flex-direction: column;
  user-select: none;
}
.personaje-card-new:hover {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px var(--primary), 5px 5px 0 var(--shadow);
}
.personaje-card-new.selected {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px var(--primary), 5px 5px 0 var(--shadow);
}
.personaje-portrait {
  width: 100%;
  aspect-ratio: 1;
  background: var(--surface-high);
  border-bottom: 2px solid var(--outline-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-head);
  font-size: 48px;
  font-weight: 700;
  color: var(--outline);
  overflow: hidden;
}
.personaje-portrait img { width: 100%; height: 100%; object-fit: cover; }
.personaje-info { padding: 12px; }
.personaje-info .p-name {
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 8px;
}
.personaje-info .p-vidas { margin-bottom: 8px; }
.personaje-info .p-desc {
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--on-muted);
  line-height: 1.5;
  border-top: 1px solid var(--outline-dim);
  padding-top: 8px;
}
.personaje-hint {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--outline);
  padding: 12px;
  text-transform: uppercase;
}

/* ── GAME SCREEN ─────────────────────────────────────── */
#screen-game { background: var(--bg); }

/* Rival panels */
#rivals-zone {
  display: flex;
  gap: 8px;
  padding: 10px 10px 6px;
  overflow-x: auto;
  flex-shrink: 0;
  background: var(--surface-low);
  border-bottom: 2px solid var(--outline-dim);
  scrollbar-width: none;
}
#rivals-zone::-webkit-scrollbar { display: none; }
.rival-panel {
  flex-shrink: 0;
  width: 110px;
  border: 2px solid var(--outline-dim);
  background: var(--surface);
  box-shadow: 3px 3px 0 var(--shadow);
  cursor: default;
  position: relative;
  transition: border-color 0.1s;
}
.rival-panel.muerto { opacity: 0.4; filter: grayscale(1); }
.rival-panel.turno  { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary), 3px 3px 0 var(--shadow); }
.rival-panel.seleccionable {
  border-color: var(--primary);
  cursor: pointer;
  animation: pulse-border 0.8s infinite;
}
.rival-panel.fuera-alcance { border-color: var(--red); }
.rival-panel.seleccionable:hover { background: var(--surface-high); }

@keyframes pulse-border {
  0%, 100% { box-shadow: 0 0 0 1px var(--primary), 3px 3px 0 var(--shadow); }
  50%       { box-shadow: 0 0 0 3px var(--primary), 3px 3px 0 var(--shadow); }
}

.rp-portrait {
  width: 100%;
  aspect-ratio: 1 / 0.85;
  background: var(--surface-high);
  border-bottom: 1px solid var(--outline-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-head);
  font-size: 24px;
  color: var(--outline);
  overflow: hidden;
  position: relative;
}
.rp-sheriff-badge {
  position: absolute; top: 4px; left: 4px;
  font-family: var(--font-mono); font-size: 8px; font-weight: 600;
  letter-spacing: 1px; background: var(--primary); color: var(--primary-text); padding: 2px 4px;
}
.rp-body { padding: 6px 6px 4px; }
.rp-name { font-family: var(--font-head); font-size: 9px; font-weight: 700; color: var(--on-surface); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.rp-personaje { font-family: var(--font-mono); font-size: 8px; color: var(--on-muted); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rp-stats { font-family: var(--font-mono); font-size: 8px; color: var(--on-muted); margin-top: 3px; }
.rp-badges { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 3px; }
.rp-badge { font-family: var(--font-mono); font-size: 7px; font-weight: 600; background: #1a2a4a; color: #88aadd; padding: 1px 3px; letter-spacing: 0.5px; }

/* Center play zone */
#play-zone {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  padding: 8px;
  position: relative;
  overflow: hidden;
}
.pile { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.pile-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; color: var(--on-muted); text-transform: uppercase; }
.pile-card {
  width: 72px; height: 104px;
  border: 2px solid var(--outline-dim);
  background: var(--surface-high);
  box-shadow: 4px 4px 0 var(--shadow);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.pile-card.back::after { content: '🂠'; font-size: 36px; opacity: 0.3; }
.pile-card.face { background: var(--paper); color: #2a1a00; border-color: var(--secondary); }
.pile-card .pc-nombre { font-family: var(--font-head); font-size: 9px; font-weight: 700; text-align: center; padding: 4px; }
.pile-card .pc-palo { font-family: var(--font-mono); font-size: 8px; color: var(--secondary); text-align: center; }

/* Mesa cards (almacen, lucky duke, etc.) */
#mesa-cards { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; align-items: center; }
.mesa-card {
  width: 72px; height: 100px;
  background: var(--paper);
  border: 2px solid var(--secondary);
  box-shadow: 4px 4px 0 var(--shadow);
  cursor: pointer;
  display: flex; flex-direction: column; justify-content: space-between; padding: 6px;
  transition: transform 0.1s, box-shadow 0.1s;
}
.mesa-card:hover { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary), 4px 4px 0 var(--shadow); }
.mesa-card .mc-nombre { font-family: var(--font-head); font-size: 9px; font-weight: 700; color: #2a1a00; line-height: 1.2; }
.mesa-card .mc-palo { font-family: var(--font-mono); font-size: 9px; color: var(--secondary); }

/* ── HAND ZONE ───────────────────────────────────────── */
#hand-zone {
  flex-shrink: 0;
  height: 130px;
  background: var(--surface-low);
  border-top: 2px solid var(--outline-dim);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 8px;
  overflow: visible;
}
#hand-cards {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  position: relative;
  height: 115px;
  width: 100%;
}

/*
 * Hand cards: wrapper+inner pattern.
 * .hc-wrap  → rotation + position + FIXED HEIGHT (card + lift room)
 * .hand-card → visual card, aligned to bottom of wrapper
 *
 * Key: wrapper height (130px) > card height (100px) + lift (22px).
 * When the card lifts, the mouse stays inside the wrapper bounds → no flicker.
 * Hover is on the wrapper, not the card, so hit-test never breaks.
 */
.hc-wrap {
  position: absolute;
  bottom: 0;
  width: 72px;
  height: 130px;            /* tall enough to contain lifted card */
  transform-origin: bottom center;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.hand-card {
  width: 72px;
  height: 100px;
  background: var(--paper);
  border: 2px solid var(--secondary);
  box-shadow: 4px 4px 0 var(--shadow);
  cursor: default;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 5px;
  transition: transform 0.15s, border-color 0.1s, box-shadow 0.1s;
  flex-shrink: 0;
}
.hand-card.jugable { cursor: pointer; }
/* Hover: wrapper sube en z-index (CSS, no JS) y carta sube 22px.
   El wrapper tiene 130px de alto, la carta 100px → cuando sube 22px
   sigue dentro del wrapper → el ratón no sale → sin parpadeo. */
.hc-wrap:hover {
  z-index: 100;
}
.hc-wrap:hover .hand-card.jugable {
  transform: translateY(-22px);
  border-color: var(--primary);
  box-shadow: 0 0 0 2px var(--primary), 4px 4px 0 var(--shadow);
}
.hand-card .hc-nombre { font-family: var(--font-head); font-size: 8px; font-weight: 700; color: #1a0e00; line-height: 1.2; }
.hand-card .hc-tipo  { font-family: var(--font-mono); font-size: 7px; color: #7a5a30; }
.hand-card.tipo-arma   { border-color: #6a7a9a; background: #e8eaf0; }
.hand-card.tipo-objeto { border-color: #4a8a6a; background: #e8f0ea; }

/* Rival card (hidden / equip) */
.rival-card-hidden {
  width: 44px; height: 62px;
  background: var(--surface-high); border: 2px solid var(--outline-dim);
  box-shadow: 3px 3px 0 var(--shadow); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; opacity: 0.7; flex-shrink: 0;
}
.rival-card-hidden:hover { border-color: var(--primary); opacity: 1; }
.rival-card-equip {
  width: 64px; height: 88px; background: var(--paper);
  border: 2px solid var(--secondary); box-shadow: 3px 3px 0 var(--shadow);
  cursor: pointer; padding: 5px; flex-shrink: 0;
}
.rival-card-equip:hover { border-color: var(--primary); }
.rival-card-equip .rce-nombre { font-family: var(--font-head); font-size: 8px; font-weight: 700; color: #2a1a00; }
.rival-card-equip .rce-badge  { font-family: var(--font-mono); font-size: 7px; color: var(--secondary); margin-top: 4px; }

/* ── PROMPT BAR ──────────────────────────────────────── */
#prompt-bar {
  flex-shrink: 0;
  background: var(--surface-low);
  border-top: 2px solid var(--outline-dim);
  padding: 10px 12px;
  min-height: 72px;
}
#prompt-texto {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--on-surface);
  margin-bottom: 8px;
  line-height: 1.4;
  min-height: 18px;
}
#prompt-botones { display: flex; gap: 8px; flex-wrap: wrap; }
.prompt-btn {
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 2px solid var(--outline);
  background: var(--surface-high);
  color: var(--on-surface);
  padding: 8px 16px;
  cursor: pointer;
  box-shadow: 3px 3px 0 var(--shadow);
  border-radius: 0;
  transition: background 0.1s, transform 0.05s, box-shadow 0.05s;
}
.prompt-btn:hover  { background: var(--primary); color: var(--primary-text); border-color: var(--primary); }
.prompt-btn:active { transform: translate(1px,1px); box-shadow: 2px 2px 0 var(--shadow); }
.prompt-btn.fin    { background: #1a3a1a; border-color: #3a8a3a; color: #8ad48a; }
.prompt-btn.fin:hover    { background: #2a6a2a; color: #fff; }
.prompt-btn.poder  { background: #1a1a3a; border-color: #3a3a8a; color: #8a8ad4; }
.prompt-btn.cancel { background: #3a1a1a; border-color: #8a3a3a; color: #d48a8a; }
/* Disabled/sending state */
.prompt-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
#prompt-bar.sending #prompt-texto::after {
  content: ' ▌';
  animation: blink 0.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── LOG DRAWER ──────────────────────────────────────── */
#log-drawer {
  position: fixed;
  bottom: 56px; left: 0; right: 0;
  height: 45vh;
  background: var(--surface-low);
  border-top: 2px solid var(--outline-dim);
  z-index: 50;
  display: none;
  flex-direction: column;
}
#log-drawer.open { display: flex; }
#log-drawer-header {
  padding: 8px 12px;
  border-bottom: 1px solid var(--outline-dim);
  display: flex; justify-content: space-between; align-items: center;
}
#log-drawer-header span { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 2px; color: var(--primary); text-transform: uppercase; }
#log-msgs { flex: 1; overflow-y: auto; padding: 8px 12px; font-family: var(--font-mono); font-size: 11px; color: var(--on-muted); line-height: 1.5; }
.log-msg { padding: 2px 0; border-bottom: 1px solid var(--outline-dim); }
.log-msg.important { color: var(--primary); }

/* ── MENU MODAL ──────────────────────────────────────── */
#menu-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
#menu-modal.open { display: flex; }
#menu-content { width: 280px; border: 2px solid var(--outline); background: var(--surface); box-shadow: 6px 6px 0 var(--shadow); }
#menu-content .menu-title { font-family: var(--font-head); font-size: 14px; font-weight: 700; letter-spacing: 2px; color: var(--primary); padding: 14px 16px; border-bottom: 2px solid var(--outline-dim); text-transform: uppercase; }
.menu-item { display: block; width: 100%; padding: 14px 16px; font-family: var(--font-head); font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; background: none; border: none; border-bottom: 1px solid var(--outline-dim); color: var(--on-surface); cursor: pointer; text-align: left; }
.menu-item:hover { background: var(--surface-high); color: var(--primary); }
.menu-item.danger { color: #ffb4ab; }
.menu-item.danger:hover { background: var(--red-dim); color: #fff; }

/* ── GAME OVER ───────────────────────────────────────── */
#screen-gameover {
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 24px 16px;
  overflow-y: auto;
}
#screen-gameover h1 { font-family: var(--font-head); font-size: 24px; font-weight: 700; color: var(--primary); text-shadow: 3px 3px 0 var(--shadow); text-align: center; }
#go-ganador { font-family: var(--font-mono); font-size: 12px; letter-spacing: 2px; color: var(--on-muted); text-transform: uppercase; text-align: center; }
#go-tabla { width: 100%; max-width: 480px; border-collapse: collapse; border: 2px solid var(--outline-dim); }
#go-tabla th { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 1px; color: var(--primary); background: var(--surface-high); padding: 8px 10px; text-align: left; text-transform: uppercase; border-bottom: 2px solid var(--outline-dim); }
#go-tabla td { font-family: var(--font-body); font-size: 13px; padding: 8px 10px; border-bottom: 1px solid var(--outline-dim); background: var(--surface); }
#go-tabla tr.vivo td  { color: #8ad48a; }
#go-tabla tr.muerto td { color: #d48a8a; opacity: 0.7; }

/* ── LAYOUT WRAPPER ──────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; }
</style>
</head>

<!-- LOG DRAWER -->

<!-- MENU MODAL -->

    <button class="menu-item danger" onclick="location.reload()">Nueva partida</button>
    <button class="menu-item" onclick="toggleMenu()">Cancelar</button>
  </div>

<script>
// ── Estado global ─────────────────────────────────────
let numJugadores = 4;
let pollInterval = null;
let logCount = 0;
let isSending = false;
let lastPreguntaKey = null;   // evita re-render si la pregunta no cambió
window._ultimoEstado = null;

// ── SETUP ─────────────────────────────────────────────
function cambiarJugadores(delta) {
  numJugadores = Math.max(4, Math.min(7, numJugadores + delta));
  document.getElementById('counter-display').textContent = numJugadores;
  generarNombres();
}

function generarNombres() {
  const c = document.getElementById('nombres-container');
  c.innerHTML = '';
  for (let i = 1; i <= numJugadores; i++) {
    const row = document.createElement('div');
    row.className = 'pistolero-row';
    row.innerHTML = `<label>Pistolero ${i}</label>
      <input id="nombre-${i}" placeholder="Nombre del jugador ${i}" autocomplete="off">`;
    c.appendChild(row);
  }
}
generarNombres();

async function iniciarPartida() {
  const btn = document.getElementById('btn-iniciar');
  btn.textContent = 'CARGANDO...';
  btn.disabled = true;

  const nombres = [];
  for (let i = 1; i <= numJugadores; i++) {
    const v = document.getElementById(`nombre-${i}`)?.value.trim();
    nombres.push(v || `Pistolero ${i}`);
  }
  await fetch('/nueva_partida', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({num_players: numJugadores, nombres})
  });
  showGameUI();
  startPolling();
}

function showGameUI() {
  document.getElementById('screen-setup').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('navbar').style.display = 'flex';
}

// ── NAVEGACIÓN ────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function toggleLog() {
  document.getElementById('log-drawer').classList.toggle('open');
  document.getElementById('nav-log').classList.toggle('active');
}
function toggleMenu() {
  document.getElementById('menu-modal').classList.toggle('open');
}

// ── POLLING — 200ms para respuesta rápida ─────────────
function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(poll, 200);
}

function preguntaKey(preg) {
  if (!preg) return null;
  // Incluye todos los campos que pueden cambiar entre preguntas del mismo tipo
  // (ej: Almacén — mismo tipo, pero lista de cartas se reduce por turno)
  return JSON.stringify({
    tipo:       preg.tipo,
    texto:      preg.texto || '',
    opciones:   preg.opciones || [],
    jugador_id: preg.jugador_id ?? null,
    cartas:     (preg.cartas || []).map(c => c.nombre),
    mano:       (preg.mano   || []).map(c => c.nombre + c.indice),
    mano_size:  preg.mano_size ?? null,
  });
}

async function poll() {
  try {
    const res = await fetch('/estado');
    const data = await res.json();

    if (data.error) {
      setPromptText('💥 ' + data.error, true);
      clearInterval(pollInterval);
      return;
    }
    if (data.estado?.jugadores) {
      window._ultimoEstado = data.estado;
      renderEstado(data.estado);
      renderDescarte(data.estado.descarte_top);
    }
    if (data.log) renderLog(data.log);

    // Solo re-renderizar la pregunta si realmente cambió
    // Esto evita reconstruir el DOM cada 200ms mientras el usuario está eligiendo
    const key = preguntaKey(data.pregunta);
    if (key !== lastPreguntaKey) {
      lastPreguntaKey = key;
      if (data.pregunta) renderPregunta(data.pregunta);
      else clearPrompt();
    }
  } catch(e) { /* ignora errores de red transitorios */ }
}

// ── ACCIÓN — debounce + re-poll inmediato ─────────────
async function enviarAccion(valor) {
  if (isSending) return;
  isSending = true;

  // Desactiva UI inmediatamente para dar feedback visual
  setSendingState(true);
  limpiarPaneles();

  try {
    await fetch('/accion', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({valor})
    });
    // Forzar re-render en el próximo poll aunque la pregunta parezca igual
    lastPreguntaKey = null;
    await poll();
  } finally {
    isSending = false;
    setSendingState(false);
  }
}

function setSendingState(on) {
  const bar = document.getElementById('prompt-bar');
  bar.classList.toggle('sending', on);
  bar.querySelectorAll('.prompt-btn').forEach(b => b.disabled = on);
  // Deshabilita también wrappers de mano
  document.querySelectorAll('.hc-wrap').forEach(w => {
    w.style.pointerEvents = on ? 'none' : '';
  });
  // Deshabilita cartas de mesa
  document.querySelectorAll('.mesa-card, .rival-card-hidden, .rival-card-equip').forEach(c => {
    c.style.pointerEvents = on ? 'none' : '';
  });
}

// ── RENDER TABLERO ────────────────────────────────────
function renderEstado(estado) {
  const n = estado.jugadores.length;
  const turnoActual = ((estado.turno_actual % n) + n) % n;

  const jugTurno = estado.jugadores[turnoActual];
  if (jugTurno) document.getElementById('phase-badge').textContent = jugTurno.nombre.toUpperCase();

  const zone = document.getElementById('rivals-zone');
  // Rebuild only when player count changes
  if (zone.children.length !== n) zone.innerHTML = '';

  estado.jugadores.forEach(j => {
    let panel = zone.querySelector(`[data-id="${j.id}"]`);
    if (!panel) {
      panel = document.createElement('div');
      panel.className = 'rival-panel';
      panel.dataset.id = j.id;
      zone.appendChild(panel);
    }

    const wasTurno = panel.classList.contains('turno');
    const isTurno = j.id === turnoActual;
    panel.className = 'rival-panel'
      + (j.muerto ? ' muerto' : '')
      + (isTurno  ? ' turno'  : '');

    const initials = j.nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const sheriffBadge = j.rol === 'Sheriff' ? '<div class="rp-sheriff-badge">SHERIFF</div>' : '';
    const rolShow = j.muerto && j.rol !== '?'
      ? `<div style="font-family:var(--font-mono);font-size:7px;color:#f2b9af;margin-top:2px;">${j.rol.toUpperCase()}</div>` : '';

    let hearts = '<div class="hearts">';
    for (let i = 0; i < j.vidasMax; i++)
      hearts += `<span class="heart ${i < j.vidas ? 'full' : 'empty'}">♥</span>`;
    hearts += '</div>';

    const armaNames = {0:'COLT',1:'VOLC',2:'SCHO',3:'REMI',4:'CARA',5:'WINC'};
    const arma = armaNames[j.arma] ?? j.arma;

    const badgeMap = {carcel:'CÁRC',mustang:'MUST',barril:'BARR',dinamita:'DINA',miraTelescopica:'MIRA',volcanic:'VOLC'};
    let badges = '<div class="rp-badges">';
    const estados = j.estados || {};
    for (const [k, lbl] of Object.entries(badgeMap))
      if (estados[k]) badges += `<span class="rp-badge">${lbl}</span>`;
    badges += '</div>';

    panel.innerHTML = `
      <div class="rp-portrait">${sheriffBadge}${initials}</div>
      <div class="rp-body">
        <div class="rp-name">${j.nombre}</div>
        <div class="rp-personaje">${j.personaje}</div>
        ${rolShow}
        ${hearts}
        <div class="rp-stats">${arma} · Rng ${j.distancia} · ${j.numCartas}🂠</div>
        ${badges}
      </div>`;
  });
}

// ── RENDER MANO — wrapper pattern sin jitter ──────────
function renderMano(mano, opciones, jugable) {
  const c = document.getElementById('hand-cards');
  c.innerHTML = '';
  if (!mano || mano.length === 0) return;

  const total = mano.length;
  const spread = Math.min(total * 30, 340);
  const step = total > 1 ? spread / (total - 1) : 0;
  const startX = -spread / 2;
  const maxAngle = Math.min(total * 3.5, 22);

  mano.forEach((carta, i) => {
    const esJugable = jugable && opciones.includes(String(carta.indice + 1));
    const tipoCls = carta.tipo === 'Arma' ? ' tipo-arma' : carta.tipo === 'Objeto' ? ' tipo-objeto' : '';
    const angle = total > 1 ? (i / (total - 1) - 0.5) * maxAngle * 2 : 0;
    const x = startX + i * step;

    // Wrapper: holds rotation (stays fixed on hover)
    // z-index NO se pone inline — lo gestiona CSS :hover para evitar conflictos
    const wrap = document.createElement('div');
    wrap.className = 'hc-wrap';
    wrap.style.left = `calc(50% + ${x}px - 36px)`;
    wrap.style.transform = `rotate(${angle}deg)`;

    // Inner card: only does translateY on hover
    const div = document.createElement('div');
    div.className = 'hand-card' + tipoCls + (esJugable ? ' jugable' : '');
    div.innerHTML = `<div class="hc-nombre">${carta.nombre}</div><div class="hc-tipo">${carta.tipo}</div>`;

    if (esJugable) {
      wrap.onclick = () => enviarAccion(String(carta.indice + 1));
    }

    wrap.appendChild(div);
    c.appendChild(wrap);
  });
}

// ── RENDER PREGUNTA ───────────────────────────────────
function renderPregunta(preg) {
  if (!preg) return;
  const tipo = preg.tipo;

  if (tipo === 'elegir_personaje') { renderElegirPersonaje(preg); return; }
  if (tipo === 'game_over')        { renderGameOver(preg); return; }

  showScreen('screen-game');
  limpiarPaneles();
  document.getElementById('mesa-cards').innerHTML = '';

  if (tipo === 'elegir_carta') {
    setPromptText(preg.texto);
    renderMano(preg.mano || [], preg.opciones, true);
    const bots = document.getElementById('prompt-botones');
    bots.innerHTML = '';
    if (preg.permitir_poder)
      bots.appendChild(mkPromptBtn('⚡ PODER', 'poder', () => enviarAccion('PODER')));
    if (preg.permitir_fin)
      bots.appendChild(mkPromptBtn('✓ FIN DE TURNO', 'fin', () => enviarAccion('FIN')));
    return;
  }

  if (tipo === 'elegir_jugador') {
    setPromptText(preg.texto);
    clearBotones();
    marcarPaneles(preg.jugadores_validos, preg.jugadores_fuera_alcance || []);
    document.getElementById('prompt-botones').appendChild(
      mkPromptBtn('✕ CANCELAR', 'cancel', () => { limpiarPaneles(); enviarAccion('None'); })
    );
    return;
  }

  if (tipo === 'elegir_carta_rival') {
    setPromptText(preg.texto);
    clearBotones();
    const mesa = document.getElementById('mesa-cards');
    for (let i = 0; i < preg.mano_size; i++) {
      const d = document.createElement('div');
      d.className = 'rival-card-hidden';
      d.textContent = '🂠';
      d.onclick = () => enviarAccion(`mano:${i}`);
      mesa.appendChild(d);
    }
    (preg.equipadas || []).forEach(c => {
      const d = document.createElement('div');
      d.className = 'rival-card-equip';
      d.innerHTML = `<div class="rce-nombre">${c.nombre}</div><div class="rce-badge">EQUIPADA</div>`;
      d.onclick = () => enviarAccion(`equipo:${c.indice}`);
      mesa.appendChild(d);
    });
    return;
  }

  if (tipo === 'elegir_lucky_duke') {
    setPromptText('Lucky Duke: elige el resultado del desenfunde');
    clearBotones();
    const mesa = document.getElementById('mesa-cards');
    [preg.carta1, preg.carta2].forEach((c, i) => {
      const d = document.createElement('div');
      d.className = 'mesa-card';
      d.innerHTML = `<div class="mc-nombre">${c.nombre}</div><div class="mc-palo">${c.palo} · ${c.numero}</div>`;
      d.onclick = () => enviarAccion(String(i));
      mesa.appendChild(d);
    });
    return;
  }

  if (tipo === 'elegir_almacen_carta' || tipo === 'elegir_kit_carlson') {
    setPromptText(tipo === 'elegir_kit_carlson'
      ? 'Kit Carlson: elige la carta a devolver al mazo'
      : 'Almacén: elige una carta');
    clearBotones();
    const mesa = document.getElementById('mesa-cards');
    (preg.cartas || []).forEach((c, i) => {
      const d = document.createElement('div');
      d.className = 'mesa-card';
      d.innerHTML = `<div class="mc-nombre">${c.nombre}</div><div class="mc-palo">${c.palo} · ${c.numero}</div>`;
      d.onclick = () => enviarAccion(String(i));
      mesa.appendChild(d);
    });
    return;
  }

  if (tipo === 'elegir_robo_pedro') {
    setPromptText('Pedro Ramírez: ¿coges la carta del descarte?');
    const mesa = document.getElementById('mesa-cards');
    const c = preg.carta_top;
    const d = document.createElement('div');
    d.className = 'mesa-card';
    d.innerHTML = `<div class="mc-nombre">${c.nombre}</div><div class="mc-palo">${c.palo} · ${c.numero}</div>`;
    mesa.appendChild(d);
    const bots = document.getElementById('prompt-botones');
    bots.innerHTML = '';
    bots.appendChild(mkPromptBtn('COGER DESCARTE', 'fin',  () => enviarAccion('SI')));
    bots.appendChild(mkPromptBtn('DEL MAZO',       '',    () => enviarAccion('NO')));
    return;
  }

  if (tipo === 'elegir_robo_jesse') {
    setPromptText('Jesse Jones: ¿robas de un rival o del mazo?');
    clearBotones();
    marcarPaneles(preg.rivales, []);
    document.getElementById('prompt-botones').appendChild(
      mkPromptBtn('DEL MAZO', '', () => { limpiarPaneles(); enviarAccion('None'); })
    );
    return;
  }

  // Prompt genérico
  setPromptText(preg.texto);
  const bots = document.getElementById('prompt-botones');
  bots.innerHTML = '';
  (preg.opciones || []).forEach(opt => {
    bots.appendChild(mkPromptBtn(opt, '', () => enviarAccion(opt)));
  });
}

// ── CHARACTER SELECTION — click en carta = confirmar ──
function renderElegirPersonaje(preg) {
  showScreen('screen-personaje');
  document.getElementById('personaje-quien').textContent =
    `${preg.nombre_jugador} · ${preg.rol}`;

  const c = document.getElementById('personaje-cards-container');
  c.innerHTML = '';

  [preg.personaje_a, preg.personaje_b].forEach((p, i) => {
    const val = i === 0 ? 'A' : 'B';
    const div = document.createElement('div');
    div.className = 'personaje-card-new';

    let heartsHTML = '<div class="hearts">';
    for (let v = 0; v < p.vidas; v++) heartsHTML += '<span class="heart full">♥</span>';
    heartsHTML += '</div>';

    const initials = p.nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    div.innerHTML = `
      <div class="personaje-portrait">${initials}</div>
      <div class="personaje-info">
        <div class="p-name">${p.nombre}</div>
        <div class="p-vidas">${heartsHTML}</div>
        <div class="p-desc">${p.desc}</div>
      </div>`;

    // Click en la carta = elegir directamente, sin botón extra
    div.onclick = () => {
      if (isSending) return;
      div.classList.add('selected');
      // Delay visual breve para que se vea la selección antes de cambiar pantalla
      setTimeout(() => {
        showScreen('screen-game');
        enviarAccion(val);
      }, 160);
    };

    c.appendChild(div);
  });
}

// ── GAME OVER ─────────────────────────────────────────
function renderGameOver(preg) {
  clearInterval(pollInterval);
  showScreen('screen-gameover');
  document.getElementById('go-ganador').textContent =
    `¡${preg.ganador.toUpperCase()} HAN GANADO!`;

  const estado = window._ultimoEstado;
  if (estado) {
    const tbody = document.getElementById('go-tabla');
    tbody.innerHTML = '<tr><th>Pistolero</th><th>Personaje</th><th>Rol</th><th>Estado</th></tr>';
    estado.jugadores.forEach(j => {
      const tr = document.createElement('tr');
      tr.className = j.muerto ? 'muerto' : 'vivo';
      tr.innerHTML = `<td>${j.nombre}</td><td>${j.personaje}</td><td>${j.rol}</td><td>${j.muerto ? '💀 Caído' : '✅ Vivo'}</td>`;
      tbody.appendChild(tr);
    });
  }
  enviarAccion('ok');
}

// ── LOG ───────────────────────────────────────────────
function renderLog(msgs) {
  if (msgs.length === logCount) return;
  logCount = msgs.length;
  const c = document.getElementById('log-msgs');
  c.innerHTML = '';
  msgs.forEach(m => {
    const d = document.createElement('div');
    d.className = 'log-msg' + (m.includes('---') || m.includes('HAN') ? ' important' : '');
    d.textContent = m;
    c.appendChild(d);
  });
  c.scrollTop = c.scrollHeight;
}

// ── HELPERS ───────────────────────────────────────────
function mkPromptBtn(texto, cls, fn) {
  const b = document.createElement('button');
  b.className = 'prompt-btn ' + cls;
  b.textContent = texto;
  b.onclick = fn;
  return b;
}

function setPromptText(txt, error = false) {
  const el = document.getElementById('prompt-texto');
  el.textContent = txt;
  el.style.color = error ? 'var(--red)' : '';
}

function clearBotones() {
  document.getElementById('prompt-botones').innerHTML = '';
}

function marcarPaneles(idsValidos, idsFuera) {
  document.querySelectorAll('.rival-panel').forEach(panel => {
    const id = parseInt(panel.dataset.id);
    if (idsValidos.includes(id)) {
      panel.classList.add('seleccionable');
      panel.onclick = () => { limpiarPaneles(); enviarAccion(String(id)); };
    } else if (idsFuera.includes(id)) {
      panel.classList.add('fuera-alcance');
    }
  });
}

function limpiarPaneles() {
  document.querySelectorAll('.rival-panel').forEach(p => {
    p.classList.remove('seleccionable', 'fuera-alcance');
    p.onclick = null;
  });
}

function renderDescarte(carta) {
  const face = document.getElementById('discard-pile');
  const back = document.getElementById('discard-empty');
  if (carta) {
    face.style.display = '';
    back.style.display = 'none';
    face.innerHTML = `<div class="pc-nombre">${carta.nombre}</div><div class="pc-palo">${carta.palo} ${carta.numero}</div>`;
  } else {
    face.style.display = 'none';
    back.style.display = '';
  }
}
</script>
</body>
</html>
